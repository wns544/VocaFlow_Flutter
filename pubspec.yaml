name: vocaflow
description: A calm, focused vocabulary study app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^8.1.7
  shared_preferences: ^2.3.5
  excel: ^4.0.6
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  google_sign_in: ^7.2.0
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.23

flutter:
  uses-material-design: true
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
    - family: NotoSerifJP
      fonts:
        - asset: assets/fonts/NotoSerifJP-Variable.ttf
    - family: SourceHanSerifJP
      fonts:
        - asset: assets/fonts/SourceHanSerifJP-Regular.otf
